<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate QR Attendance System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --dark: #343a40; --warning: #ffc107; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header p { margin: 10px 0 0 0; opacity: 0.9; }
        
        .card { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); margin-bottom: 20px; }
        
        /* Scanner & Laser */
        #reader { width: 100%; border-radius: 10px; overflow: hidden; position: relative; border: 3px solid #667eea; background: #000; aspect-ratio: 1; }
        #reader__scan_region::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: rgba(255, 0, 0, 0.8); box-shadow: 0 0 20px red; animation: scanLine 2.5s infinite linear; pointer-events: none; }
        @keyframes scanLine { 0% { top: 0; } 100% { top: 100%; } }

        /* Status & UI */
        #status-msg { margin-top: 15px; padding: 15px; border-radius: 8px; display: none; text-align: center; font-weight: bold; animation: slideDown 0.3s ease; }
        .success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .warning { background: #fff3cd; color: #856404; border-left: 4px solid #ffc107; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .counter-badge { background: var(--primary); color: white; padding: 8px 16px; border-radius: 20px; font-size: 1em; font-weight: bold; }
        .stats { display: flex; gap: 10px; margin: 10px 0; flex-wrap: wrap; }
        .stat-item { flex: 1; min-width: 100px; background: #f8f9fa; padding: 10px; border-radius: 8px; text-align: center; }
        .stat-label { font-size: 0.75em; color: #666; }
        .stat-value { font-size: 1.3em; font-weight: bold; color: var(--primary); }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 1em; transition: border 0.3s; }
        input:focus { outline: none; border-color: var(--primary); }
        
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; font-size: 0.9em; transition: 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        button:active { transform: scale(0.98); }
        .btn-csv { background: var(--primary); }
        .btn-reset { background: var(--danger); }
        .btn-gen { background: var(--success); width: 100%; margin-top: 10px; }
        .btn-copy { background: var(--warning); color: #000; padding: 8px 12px; font-size: 0.8em; flex: 0 1 auto; }
        
        /* Session List */
        #session-list { list-style: none; padding: 0; margin-top: 15px; max-height: 250px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }
        #session-list li { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 0.9em; transition: background 0.2s; }
        #session-list li:hover { background: #f9f9f9; }
        #session-list li:last-child { border-bottom: none; }
        .time-badge { background: #e3f2fd; color: var(--primary); padding: 4px 8px; border-radius: 4px; font-size: 0.8em; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 15px; border-bottom: 2px solid #eee; }
        .tab { padding: 10px 20px; cursor: pointer; border: none; background: none; font-weight: bold; color: #666; border-bottom: 3px solid transparent; transition: all 0.3s; }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .qr-display { display: flex; justify-content: center; padding: 20px; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #0056b3; }
        
        @media (max-width: 600px) {
            .header h1 { font-size: 1.8em; }
            .card { max-width: 90%; padding: 15px; }
            #reader { aspect-ratio: 4/5; }
        }
    </style>
</head>
<body>
    
    <div class="header">
        <h1>📱 QR Attendance System</h1>
        <p>Real-time attendance tracking</p>
    </div>

    <div class="card">
        <h2 style="margin:0 0 15px 0;">📸 QR Scanner</h2>
        <div id="reader"></div>
        <div id="status-msg"></div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3 style="margin:0;">Session Log</h3>
            <span class="counter-badge">Total: <span id="attendance-count">0</span></span>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-label">Today</div>
                <div class="stat-value" id="stat-today">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Duplicates</div>
                <div class="stat-value" id="stat-duplicates">0</div>
            </div>
        </div>
        
        <input type="text" id="search-bar" onkeyup="filterLog()" placeholder="🔍 Search names...">
        <div class="btn-group">
            <button class="btn-csv" onclick="downloadCSV()">📥 Export CSV</button>
            <button class="btn-reset" onclick="resetSession()">🗑️ Reset</button>
        </div>
        <ul id="session-list"></ul>
    </div>

    <div class="card">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('generator')">🎲 Generator</button>
            <button class="tab" onclick="switchTab('batch')">📋 Batch Upload</button>
        </div>
        
        <div id="generator" class="tab-content active">
            <h3 style="margin:0 0 15px 0;">Generate QR Code</h3>
            <input type="text" id="test-input" placeholder="Enter ID/Name to generate QR">
            <button class="btn-gen" onclick="generateTestQR()">Generate QR Code</button>
            <div id="qrcode" class="qr-display"></div>
        </div>
        
        <div id="batch" class="tab-content">
            <h3 style="margin:0 0 15px 0;">Batch Generate QR Codes</h3>
            <textarea id="batch-input" style="width: 100%; height: 120px; padding: 10px; border: 2px solid #ddd; border-radius: 8px; font-family: monospace; resize: vertical;" placeholder="Enter one ID/Name per line:&#10;John&#10;Sarah&#10;Mike"></textarea>
            <button class="btn-gen" onclick="generateBatchQR()">Generate All QR Codes</button>
            <button class="btn-csv" onclick="downloadBatchQR()" style="margin-top: 10px;">📥 Download as HTML</button>
            <div id="batch-output" style="margin-top: 15px; max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyA6TEluC2GoCskWPhpyxVR6dnjhNXA4PHxi4R4k-GiOth0FUfcAGxadvxYTJpjmkc/exec";
        let isProcessing = false;
        let lastScannedUser = "";
        let attendanceData = [];
        let duplicateCount = 0;
        const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
        const errorBeep = new Audio('https://assets.mixkit.co/active_storage/sfx/2570/2570-preview.mp3');

        // ===== TAB SWITCHING =====
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            event.target.classList.add('active');
        }

        // ===== SCAN SUCCESS LOGIC =====
        function onScanSuccess(decodedText) {
            if (isProcessing) return;

            const isDuplicate = attendanceData.some(entry => entry.name === decodedText);
            
            if (isDuplicate && decodedText === lastScannedUser) {
                showStatus("⚠️ Person already checked in!", "warning");
                duplicateCount++;
                updateStats();
                return;
            }

            isProcessing = true;
            lastScannedUser = decodedText;
            beep.play().catch(() => {});

            // Update UI feedback
            const status = document.getElementById('status-msg');
            status.style.display = 'block';
            status.classList.add('success');
            status.classList.remove('warning', 'error');
            status.innerHTML = `✅ Checked In: <strong>${decodedText}</strong>`;

            // Add to Local Memory
            const entry = {
                id: Date.now(),
                name: decodedText,
                time: new Date().toLocaleTimeString(),
                date: new Date().toLocaleDateString()
            };
            attendanceData.push(entry);
            updateStats();

            // Update List & Counter
            document.getElementById('attendance-count').innerText = attendanceData.length;
            const list = document.getElementById('session-list');
            const listItem = document.createElement('li');
            listItem.innerHTML = `<span><strong>${entry.name}</strong></span><span class="time-badge">${entry.time}</span>`;
            list.insertBefore(listItem, list.firstChild);

            // Send to Google Sheets
            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: decodedText, timestamp: entry.time })
            }).catch(err => console.log("Offline: Data stored locally"));

            setTimeout(() => {
                isProcessing = false;
                lastScannedUser = "";
                status.style.display = 'none';
            }, 3000);
        }

        // ===== SHOW STATUS MESSAGE =====
        function showStatus(msg, type = "success") {
            const status = document.getElementById('status-msg');
            status.style.display = 'block';
            status.className = type;
            status.innerHTML = msg;
            setTimeout(() => status.style.display = 'none', 4000);
        }

        // ===== UPDATE STATISTICS =====
        function updateStats() {
            document.getElementById('stat-today').innerText = attendanceData.length;
            document.getElementById('stat-duplicates').innerText = duplicateCount;
        }

        // ===== FILTER LOG =====
        function filterLog() {
            const query = document.getElementById('search-bar').value.toLowerCase();
            const items = document.querySelectorAll('#session-list li');
            items.forEach(li => {
                li.style.display = li.innerText.toLowerCase().includes(query) ? "" : "none";
            });
        }

        // ===== DOWNLOAD CSV =====
        function downloadCSV() {
            if (attendanceData.length === 0) return alert("📭 Log is empty!");
            let csv = "Name,Date,Time\n" + attendanceData.map(r => `"${r.name}",${r.date},${r.time}`).join("\n");
            downloadFile(csv, `Attendance_${new Date().toISOString().slice(0,10)}.csv`, 'text/csv');
            showStatus("✅ CSV exported successfully!");
        }

        // ===== DOWNLOAD FILE HELPER =====
        function downloadFile(content, filename, type) {
            const blob = new Blob([content], { type });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        // ===== RESET SESSION =====
        function resetSession() {
            if (confirm("🗑️  Clear local history? (Data in Sheets stays safe)")) {
                attendanceData = [];
                duplicateCount = 0;
                document.getElementById('session-list').innerHTML = "";
                document.getElementById('attendance-count').innerText = "0";
                updateStats();
                showStatus("🔄 Session cleared!");
            }
        }

        // ===== GENERATE SINGLE QR CODE =====
        function generateTestQR() {
            const val = document.getElementById('test-input').value.trim();
            if (!val) return alert("⚠️  Input required!");
            document.getElementById("qrcode").innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: val,
                width: 200,
                height: 200,
                colorDark: "#333",
                colorLight: "#fff"
            });
            showStatus(`✅ QR Code generated for: <strong>${val}</strong>`);
        }

        // ===== GENERATE BATCH QR CODES =====
        function generateBatchQR() {
            const input = document.getElementById('batch-input').value.trim();
            if (!input) return alert("⚠️  Enter at least one ID/Name!");
            
            const ids = input.split('\n').map(x => x.trim()).filter(x => x);
            const output = document.getElementById('batch-output');
            output.innerHTML = '';
            
            ids.forEach(id => {
                const container = document.createElement('div');
                container.style.cssText = 'margin: 15px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; text-align: center;';
                container.innerHTML = `<p style="margin: 0 0 10px 0; font-weight: bold;">${id}</p>`;
                const qrDiv = document.createElement('div');
                qrDiv.style.cssText = 'display: flex; justify-content: center; margin-bottom: 10px;';
                container.appendChild(qrDiv);
                
                const downloadBtn = document.createElement('button');
                downloadBtn.className = 'btn-copy';
                downloadBtn.innerHTML = '💾 Save QR';
                downloadBtn.onclick = function(e) {
                    e.preventDefault();
                    downloadQRCode(qrDiv, id);
                };
                container.appendChild(downloadBtn);
                
                output.appendChild(container);
                new QRCode(qrDiv, {
                    text: id,
                    width: 150,
                    height: 150,
                    colorDark: "#333",
                    colorLight: "#fff"
                });
            });
            
            showStatus(`✅ Generated ${ids.length} QR codes!`);
        }

        // ===== DOWNLOAD SINGLE QR CODE =====
        function downloadQRCode(qrDiv, name) {
            const canvas = qrDiv.querySelector('canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.href = canvas.toDataURL();
                link.download = `QR_${name}.png`;
                link.click();
                showStatus(`📥 Downloaded: QR_${name}.png`);
            }
        }

        // ===== DOWNLOAD BATCH QR CODES =====
        function downloadBatchQR() {
            const input = document.getElementById('batch-input').value.trim();
            if (!input) return alert("⚠️  Enter at least one ID/Name!");
            
            const ids = input.split('\n').map(x => x.trim()).filter(x => x);
            let html = `
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>QR Codes</title>
    <style>
        body { font-family: Arial; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .qr-card { border: 1px solid #ddd; padding: 20px; text-align: center; border-radius: 8px; }
        .qr-card h3 { margin: 0 0 15px 0; }
        .qr-card img { width: 150px; height: 150px; }
    </style>
</head>
<body>`;
            
            ids.forEach(id => {
                const qrUrl = generateQRUrl(id);
                html += `<div class="qr-card"><h3>${id}</h3><img src="${qrUrl}" alt="QR"></div>`;
            });
            
            html += `</body></html>`;
            downloadFile(html, `QR_Codes_${new Date().toISOString().slice(0,10)}.html`, 'text/html');
            showStatus(`✅ Downloaded HTML with ${ids.length} QR codes!`);
        }

        // ===== GENERATE QR URL =====
        function generateQRUrl(text) {
            return `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(text)}`;
        }

        // ===== INITIALIZE SCANNER =====
        let scanner = new Html5QrcodeScanner("reader", {
            fps: 15,
            qrbox: { width: 250, height: 250 },
            rememberLastUsedCamera: true,
            showTorchButtonIfSupported: true
        });
        
        scanner.render(onScanSuccess, (error) => {
            console.log("Scanner error:", error);
        });
    </script>
</body>
</html>
